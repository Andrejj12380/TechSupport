<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechSupport Pro</title>
  <!-- Favicon (SVG) -->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="shortcut icon" href="/favicon.svg">
  <meta name="theme-color" content="#FF5B00">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              DEFAULT: '#FF5B00',
              50: '#fff7ed',
              100: '#ffedd5',
              200: '#fed7aa',
              300: '#fdba74',
              400: '#fb923c',
              500: '#f97316',
              600: '#ea580c',
              700: '#c2410c',
              800: '#9a3412',
              900: '#7c2d12',
            },
            surface: {
              50: '#f8fafc',
              100: '#f1f5f9',
              200: '#e2e8f0',
              300: '#cbd5e1',
              400: '#94a3b8',
              500: '#64748b',
              600: '#475569',
              700: '#334155',
              800: '#1e293b',
              900: '#0f172a',
              950: '#020617',
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            display: ['Outfit', 'Inter', 'sans-serif'],
          },
          animation: {
            'subtle-pulse': 'subtle-pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            'subtle-pulse': {
              '0%, 100%': { opacity: 1 },
              '50%': { opacity: 0.85 },
            }
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      scrollbar-gutter: stable;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .font-display {
      font-family: 'Outfit', sans-serif;
    }

    /* Глобальные стили скроллбара */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f5f9;
      /* slate-50 */
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      /* slate-200 */
      border-radius: 10px;
      border: 2px solid #f1f5f9;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
      /* slate-400 */
    }

    /* Темная тема для скроллбара (через медиа-запрос или класс dark) */
    .dark ::-webkit-scrollbar-track {
      background: #18181b;
      /* new slate-900 */
    }

    .dark ::-webkit-scrollbar-thumb {
      background: #3f3f46;
      /* new slate-700 */
      border-color: #18181b;
    }

    .dark ::-webkit-scrollbar-thumb:hover {
      background: #52525b;
      /* new slate-600 */
    }

    /* Стили для кастомных контейнеров (.custom-scrollbar) */
    .custom-scrollbar::-webkit-scrollbar {
      width: 5px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: #f1f5f9;
      /* slate-100 */
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #e2e8f0;
      /* slate-200 */
      border-radius: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #FF5B00;
      /* Фирменный оранжевый при наведении */
    }

    /* Стили для темной боковой панели */
    aside::-webkit-scrollbar-track {
      background: #18181b;
      /* new slate-900 */
    }

    aside::-webkit-scrollbar-thumb {
      background: #3f3f46;
      /* new slate-700 */
      border-color: #18181b;
    }

    aside::-webkit-scrollbar-thumb:hover {
      background: #52525b;
      /* new slate-600 */
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="bg-slate-50 text-slate-900">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
